<main class="min-h-screen px-4 py-6">
    <div class="max-w-5xl mx-auto">
        <a id="back-link" class="inline-block mb-4 text-sm text-indigo-300 hover:text-indigo-200 hover:underline">
            ← Back to Analysis
        </a>
        <div id="cause-map" class="space-y-6"></div>

    </div>
</main>
<script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("event");

    function createSlug(text) {
        return (text || "")
            .toLowerCase()
            .replace(/&/g, "and")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-|-$/g, "");
    }

    async function loadCauseMap() {
        const response = await fetch("https://geopolitical-news-analysis.onrender.com/api/events");
        const events = await response.json();

        const eventData =
            events.find((item) => createSlug(item.headline) === slug) || events[0];

        renderCauseMap(eventData);
    }

    function renderCauseMap(data) {
        const container = document.getElementById("cause-map");

        document.title = `${data.headline} | Cause Map`;

        container.innerHTML = `
        <!-- HEADLINE -->
        <div class="text-center">
            <h1 class="text-2xl font-bold text-white">${data.headline}</h1>
        </div>

        ${arrow()}

        <!-- PRIMARY DYNAMICS -->
        <div class="grid gap-4 md:grid-cols-2">
            ${(data.primary_dynamics || []).map(d => card(`
                <p class="text-indigo-300 text-sm uppercase">${d.type}</p>
                <h3 class="text-lg font-semibold text-white">${d.name}</h3>
                <p class="text-slate-300 text-sm mt-2">${d.role}</p>
            `)).join("")}
        </div>

        ${arrow()}

        <!-- CONSTRAINTS -->
        ${card(`
            <h2 class="text-indigo-300 font-semibold mb-2">Constraints & Pressures</h2>
            <ul class="list-disc pl-5 text-slate-300 text-sm space-y-1">
                ${data.constraints_and_pressures.map(c => `<li>${c}</li>`).join("")}
            </ul>
        `)}

        ${arrow()}

        <!-- CORE LOGIC -->
        ${card(`
            <h2 class="text-indigo-300 font-semibold mb-2">Core Logic</h2>
            <p class="text-slate-300 text-sm">${data.core_logic}</p>
        `)}

        ${arrow()}

        <!-- RISKS -->
        ${card(`
            <h2 class="text-indigo-300 font-semibold mb-2">Risks</h2>
            <ul class="text-slate-300 text-sm space-y-2">
                ${data.risks.map(r => `
                    <li>
                        <span class="font-semibold text-white">${r.risk}</span>
                        <div class="text-xs text-indigo-300">${r.time_horizon}</div>
                    </li>
                `).join("")}
            </ul>
        `)}

        ${arrow()}

        <!-- WHAT TO WATCH -->
        ${card(`
            <h2 class="text-indigo-300 font-semibold mb-2">What to Watch</h2>
            <ul class="list-disc pl-5 text-slate-300 text-sm space-y-1">
                ${data.what_to_watch.map(w => `<li>${w}</li>`).join("")}
            </ul>
        `)}
    `;
        console.log(data);
    }

    window.addEventListener("DOMContentLoaded", () => {
        const backLink = document.getElementById("back-link");
        backLink.href = `/event_detail.html?event=${slug}`;

        loadCauseMap();
    });

    function card(content) {
        return `
        <div class="rounded border border-indigo-300/20 bg-slate-900/70 p-4">
            ${content}
        </div>
    `;
    }

    function arrow() {
        return `
        <div class="flex justify-center">
            <div class="text-indigo-400 text-xl">↓</div>
        </div>
    `;
    }
</script>
