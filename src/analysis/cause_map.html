Cause Map Prototype (Not included in final UI)
Future feature: structured → visual reasoning layer
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cause Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #020816;
            color: #f4f7fb;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::marker {
            content: "";
        }
    </style>
</head>

<main class="min-h-screen px-4 py-6">
    <div class="max-w-5xl mx-auto">
        <a id="back-link" class="inline-block mb-4 text-sm text-indigo-300 hover:text-indigo-200 hover:underline">
            ← Back to Analysis
        </a>
        <div id="cause-map" class="space-y-6"></div>

    </div>
</main>
<script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("event");

    function createSlug(text) {
        return (text || "")
            .toLowerCase()
            .replace(/&/g, "and")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-|-$/g, "");
    }

    async function loadCauseMap() {
        const response = await fetch("https://geopolitical-news-analysis.onrender.com/api/events");
        const events = await response.json();

        const eventData =
            events.find((item) => createSlug(item.headline) === slug) || events[0];

        renderCauseMap(eventData);
    }

    function renderCauseMap(data) {
        const container = document.getElementById("cause-map");

        document.title = `${data.headline} | Cause Map`;

        container.innerHTML = `
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">${data.headline}</h1>
        </div>

        ${section("Actors + Constraints", `
            <div class="space-y-3">
                ${(data.primary_dynamics || []).map(d => `
                    <div>
                        <div class="text-indigo-300 text-xs uppercase">${d.type}</div>
                        <div class="text-white font-semibold">${d.name}</div>
                    </div>
                `).join("")}

                <div class="mt-4 border-t border-indigo-300/20 pt-3">
                    <ul class="list-disc pl-5 text-sm text-slate-300 space-y-1">
                        ${(data.constraints_and_pressures || []).map(c => `<li>${c}</li>`).join("")}
                    </ul>
                </div>
            </div>
        `)}

        ${arrow()}

        ${section("Core Logic", `
            <p class="text-slate-300 text-sm leading-7">
                ${data.core_logic}
            </p>
        `)}

        ${arrow()}

        ${section("Outcomes (Risks)", `
            <ul class="space-y-3">
                ${(data.risks || []).map(r => `
                    <li>
                        <div class="text-xs uppercase text-indigo-300">${r.time_horizon}</div>
                        <div class="text-white font-semibold">${r.risk}</div>
                    </li>
                `).join("")}
            </ul>
        `)}

        ${arrow()}

        ${section("Signals (What to Watch)", `
            <ul class="list-disc pl-5 text-sm text-slate-300 space-y-1">
                ${(data.what_to_watch || []).slice(0, 6).map(w => `<li>${w}</li>`).join("")}
            </ul>
        `)}
    `;
        console.log(data);
    }

    function section(title, content) {
        return `
        <details class="rounded border border-indigo-300/20 bg-slate-900/70 p-4 group">
            <summary class="cursor-pointer list-none flex justify-between items-center">
                <span class="text-white font-semibold">${title}</span>
                <span class="text-indigo-400 group-open:rotate-180 transition">▼</span>
            </summary>

            <div class="mt-4">
                ${content}
            </div>
        </details>
    `;
    }

    function arrow() {
        return `
        <div class="flex justify-center my-2">
            <div class="text-indigo-400 text-xl">↓</div>
        </div>
    `;
    }

    window.addEventListener("DOMContentLoaded", () => {
        const backLink = document.getElementById("back-link");
        backLink.href = `/event_detail.html?event=${slug}`;

        loadCauseMap();
    });
</script>
